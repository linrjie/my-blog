<script>
renderArticleList("article-list");
initDailyQuote();
initBgSlideshow();
renderProjectList("project-list");
var allTags = [...new Set(articles.flatMap(function(a){ return a.tags; }))];
var tagsEl = document.getElementById("sidebar-tags");
if(tagsEl){tagsEl.innerHTML = allTags.slice(0,10).map(function(t){return '<a href="tags.html?tag='+encodeURIComponent(t)+'" class="sidebar-tag">'+t+'</a>';}).join("");}
var si = document.getElementById("search-input");
if(si){var dt;si.addEventListener("input",function(){clearTimeout(dt);dt=setTimeout(function(){var q=si.value;var r=searchArticles(q);var c=document.getElementById("article-list");if(!c)return;if(r.length===0){c.innerHTML='<p style="text-align:center;color:var(--text-muted);padding:40px 0">没有找到匹配的文章</p>';return;}c.innerHTML=r.map(function(a){return '<a href="article.html?id='+a.id+'" class="article-card"><div class="article-card-header"><h3 class="article-card-title">'+highlightText(a.title,q)+'</h3><span class="article-card-date">'+a.date+'</span></div><p class="article-card-summary">'+highlightText(a.excerpt,q)+'</p><div class="article-card-tags">'+a.tags.map(function(t){return '<span class="article-tag">'+t+'</span>';}).join("")+'</div></a>';}).join("");},200);});}
async function applyHeroSettings(){var s=await SettingsStore.get();document.getElementById("hero-name").textContent=s.name;document.getElementById("hero-desc").textContent=s.subtitle;document.getElementById("hero-avatar-img").src=s.avatar;}
applyHeroSettings();
</script>
