<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>留言板 - 我的博客</title>
    <meta name="description" content="个人博客 - 留言板 - 我的博客" />
    <meta property="og:title" content="留言板 - 我的博客" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="bg-layer">
      <div class="bg-image active" style="background-image:url('https://images.unsplash.com/photo-1519681393784-d120267933ba?w=800&q=60')"></div>
      <div class="bg-image" style="background-image:url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=800&q=60')"></div>
      <div class="bg-overlay"></div>
      <div class="bg-gradient"></div>
      <div class="glow-blob top-left"></div>
      <div class="glow-blob bottom-right"></div>
    </div>
    <div class="fireflies">
      <div class="firefly" style="top:20%;left:15%"></div>
      <div class="firefly" style="top:60%;left:75%"></div>
      <div class="firefly" style="top:40%;left:45%"></div>
    </div>

    <header class="header">
      <div class="header-inner">
        <a href="index.html" class="logo">MyBlog<span class="logo-accent">の</span>宝藏之地</a>
        <button class="nav-toggle" id="nav-toggle" onclick="toggleNav()" aria-label="切换导航菜单" aria-expanded="false">
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
        </button>
        <nav class="nav" id="main-nav">
          <a href="index.html">首页</a>
          <a href="notes.html">笔记</a>
          <a href="guestbook.html">留言</a>
          <a href="gallery.html">图集</a>
          <a href="friends.html">友链</a>
          <a href="tags.html">标签</a>
          <a href="changelog.html">日志</a>
          <a href="about.html">关于</a>
          <a href="settings.html" title="设置">⚙️ 设置</a>
          <span id="sync-status" style="font-size:0.7rem;margin:8px 0"></span>
          <button class="theme-toggle" onclick="toggleTheme()" aria-pressed="false">🌙 主题切换</button>
        </nav>
        <div class="nav-overlay" id="nav-overlay" onclick="closeNav()"></div>
      </div>
    </header>

    <main class="main">
      <nav class="breadcrumb">
        <a href="index.html">首页</a>
        <span class="breadcrumb-sep">›</span>
        <span>留言板</span>
      </nav>

      <!-- Message Form -->
      <div class="form-card">
        <h2>💬 留下你的足迹</h2>
        <div class="form-group">
          <label>昵称</label>
          <input type="text" id="msg-name" placeholder="你的名字..." />
        </div>
        <div class="form-group">
          <label>留言内容</label>
          <textarea id="msg-content" placeholder="说点什么吧..." rows="4"></textarea>
        </div>
        <div class="form-group">
          <label>附图（可选）</label>
          <div class="file-upload">
            <label class="file-upload-btn">
              🖼 选择图片
              <input type="file" id="msg-image" accept="image/*" />
            </label>
          </div>
          <div class="file-preview" id="msg-image-preview"></div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" onclick="submitMessage()">📨 发送留言</button>
          <button class="btn btn-secondary" onclick="resetMsgForm()">清空</button>
        </div>
      </div>

      <!-- Messages List -->
      <h2 class="section-title">📮 留言列表</h2>
      <div class="message-list" id="message-list"></div>
    </main>

    <footer class="footer">
      <p>© 2026 MyBlog · 用 ❤️ 和代码构建</p>
    </footer>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
      <button class="lightbox-close" onclick="closeLightbox()">✕</button>
      <img loading="lazy" src="" alt="preview" onclick="event.stopPropagation()" />
    </div>

    <button class="back-to-top" id="back-to-top" onclick="scrollToTop()">↑</button>

    <script src="js/storage.js"></script>
    <script src="js/main.js"></script>
    <script src="js/guestbook.js"></script>
    <script src="js/settings.js"></script>
    <script>
      initBgSlideshow();
    </script>
  </body>
</html>
