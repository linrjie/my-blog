<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>设置 - 我的博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .settings-avatar-upload {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
      }
      .settings-avatar-ring {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), #a855f7);
        padding: 4px;
        cursor: pointer;
        transition: transform 0.3s, box-shadow 0.3s;
      }
      .settings-avatar-ring:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
      }
      .settings-avatar-ring img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        background: white;
        display: block;
      }
      .settings-avatar-hint {
        font-size: 0.85rem;
        color: var(--text-muted);
      }
      .settings-avatar-hint span {
        color: var(--accent);
        font-weight: 600;
        cursor: pointer;
      }
      .settings-preview {
        background: var(--bg-card);
        backdrop-filter: blur(16px);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 24px;
        margin-top: 24px;
      }
      .settings-preview h3 {
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 16px;
      }
      .settings-preview-card {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px;
        background: var(--accent-soft);
        border-radius: var(--radius-xs);
      }
      .settings-preview-avatar {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--accent);
      }
      .settings-preview-name {
        font-size: 1.1rem;
        font-weight: 900;
        color: var(--text-primary);
      }
      .settings-preview-sub {
        font-size: 0.8rem;
        color: var(--text-secondary);
        margin-top: 2px;
      }
    </style>
      <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  </head>
  <body>
    <div class="bg-layer">
      <div class="bg-image active" style="background-image:url('https://images.unsplash.com/photo-1519681393784-d120267933ba?w=800&q=60')"></div>
      <div class="bg-image" style="background-image:url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=800&q=60')"></div>
      <div class="bg-overlay"></div>
      <div class="bg-gradient"></div>
      <div class="glow-blob top-left"></div>
      <div class="glow-blob bottom-right"></div>
    </div>
    <div class="fireflies">
      <div class="firefly" style="top:20%;left:15%"></div>
      <div class="firefly" style="top:60%;left:75%"></div>
      <div class="firefly" style="top:40%;left:45%"></div>
    </div>

    <header class="header">
      <div class="header-inner">
        <a href="index.html" class="logo">MyBlog<span class="logo-accent">の</span>宝藏之地</a>
        <button class="nav-toggle" id="nav-toggle" onclick="toggleNav()">
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
        </button>
        <nav class="nav" id="main-nav">
          <a href="index.html">首页</a>
          <a href="notes.html">笔记</a>
          <a href="guestbook.html">留言</a>
          <a href="gallery.html">图集</a>
          <a href="friends.html">友链</a>
          <a href="tags.html">标签</a>
          <a href="changelog.html">日志</a>
          <a href="about.html">关于</a>
          <a href="settings.html" title="设置">⚙️ 设置</a>
          <span id="sync-status" style="font-size:0.7rem;margin:8px 0"></span>
          <button class="theme-toggle" onclick="toggleTheme()">🌙 主题切换</button>
        </nav>
        <div class="nav-overlay" id="nav-overlay" onclick="closeNav()"></div>
      </div>
    </header>

    <main class="main">
      <nav class="breadcrumb">
        <a href="index.html">首页</a>
        <span class="breadcrumb-sep">›</span>
        <span>设置</span>
      </nav>

      <div class="form-card">
        <h2>⚙️ 个性化设置</h2>

        <!-- Avatar Upload -->
        <div class="settings-avatar-upload">
          <div class="settings-avatar-ring" onclick="document.getElementById('settings-avatar-input').click()">
            <img id="settings-avatar-preview" src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=c0aede" alt="avatar" />
          </div>
          <input type="file" id="settings-avatar-input" accept="image/*" style="display:none" />
          <div class="settings-avatar-hint">点击头像上传新图片 · <span onclick="document.getElementById('settings-avatar-input').click()">更换头像</span></div>
        </div>

        <!-- Name -->
        <div class="form-group">
          <label>昵称</label>
          <input type="text" id="settings-name" placeholder="你的名字..." />
        </div>

        <!-- Subtitle -->
        <div class="form-group">
          <label>个人简介</label>
          <textarea id="settings-subtitle" rows="3" placeholder="一句话介绍自己..."></textarea>
        </div>

        <!-- Actions -->
        <div class="form-actions">
          <button class="btn btn-primary" id="settings-save">💾 保存设置</button>
          <button class="btn btn-secondary" id="settings-reset">↺ 恢复默认</button>
        </div>
      </div>

      <!-- Live Preview -->
      <div class="settings-preview">
        <h3>实时预览</h3>
        <div class="settings-preview-card">
          <img class="settings-preview-avatar" id="preview-avatar" src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=c0aede" alt="avatar" />
          <div>
            <div class="settings-preview-name" id="preview-name">XingHuiSama</div>
            <div class="settings-preview-sub" id="preview-sub">在代码与学术间穿梭的普通人。记录技术思考，分享学习心得。</div>
          </div>
        </div>
      </div>

      <!-- Other Settings -->
      <div class="form-card" style="margin-top:20px">
        <h2>🎨 其他设置</h2>
        <div class="form-group">
          <label>主题模式</label>
          <div style="display:flex;gap:10px;align-items:center">
            <button class="btn btn-secondary" onclick="document.documentElement.removeAttribute('data-theme');localStorage.setItem('theme','light')">☀️ 浅色</button>
            <button class="btn btn-secondary" onclick="document.documentElement.setAttribute('data-theme','dark');localStorage.setItem('theme','dark')">🌙 深色</button>
            <span style="font-size:0.8rem;color:var(--text-muted)">或使用右上角按钮切换</span>
          </div>
        </div>
        <div class="form-group">
          <label>清除所有数据</label>
          <button class="btn btn-secondary" style="color:#ef4444;border-color:rgba(239,68,68,0.3)" onclick="if(confirm('确定要清除所有博客数据吗？此操作不可恢复！')){localStorage.clear();location.reload()}">🗑 清除所有数据</button>
          <div style="font-size:0.8rem;color:var(--text-muted);margin-top:6px">将清除所有笔记、留言、图集、设置等本地数据</div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p>© 2026 MyBlog · 用 ❤️ 和代码构建</p>
    </footer>

    <button class="back-to-top" id="back-to-top" onclick="scrollToTop()">↑</button>

    <script src="js/storage.js"></script>
    <script src="js/main.js"></script>
    <script src="js/settings.js"></script>
    <script>
      initBgSlideshow();

      // 实时预览
      const nameInput = document.getElementById("settings-name");
      const subtitleInput = document.getElementById("settings-subtitle");
      const avatarInput = document.getElementById("settings-avatar-input");
      const previewName = document.getElementById("preview-name");
      const previewSub = document.getElementById("preview-sub");
      const previewAvatar = document.getElementById("preview-avatar");
      const avatarPreview = document.getElementById("settings-avatar-preview");

      nameInput.addEventListener("input", () => {
        previewName.textContent = nameInput.value || "XingHuiSama";
      });

      subtitleInput.addEventListener("input", () => {
        previewSub.textContent = subtitleInput.value || "在代码与学术间穿梭的普通人...";
      });

      avatarInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          previewAvatar.src = ev.target.result;
          avatarPreview.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      });
    </script>
  </body>
</html>
